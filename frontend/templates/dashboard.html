<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>KrishiMitra AI Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body class="bg-light">

<div class="container py-4">

    <!-- Header -->

    <h2 class="text-center text-success fw-bold" id="title">
        🌾 KrishiMitra AI
    </h2>

    <p class="text-center text-muted" id="subtitle">
        Smart Farming Dashboard
    </p>

    <div class="row g-3 mt-4">

        <!-- Crop -->

        <div class="col-md-4 col-6">

            <a href="/crop" class="text-decoration-none text-dark">

                <div class="card shadow text-center p-3 h-100">

                    🌱

                    <br>

                    <b id="crop">
                        Crop Selection
                    </b>

                </div>

            </a>

        </div>

        <!-- Detect -->

        <div class="col-md-4 col-6">

            <div class="card shadow text-center p-3 h-100">

                📷

                <br>

                <b id="detect">
                    Detect Disease
                </b>

            </div>

        </div>

        <!-- Temperature -->

        <div class="col-md-4 col-6">

            <div class="card shadow text-center p-3 h-100">

                🌡️

                <br>

                <b id="temperature">
                    Temperature
                </b>

            </div>

        </div>

        <!-- Soil -->

        <div class="col-md-4 col-6">

            <div class="card shadow text-center p-3 h-100">

                🌾

                <br>

                <b id="soil">
                    Soil Check
                </b>

            </div>

        </div>

        <!-- Fertilizer -->

        <div class="col-md-4 col-6">

            <div class="card shadow text-center p-3 h-100">

                🧮

                <br>

                <b id="fertilizer">
                    Fertilizer Calculator
                </b>

            </div>

        </div>

        <!-- AI -->

        <div class="col-md-4 col-6">

            <div class="card shadow text-center p-3 h-100">

                🤖

                <br>

                <b id="assistant">
                    AI Assistant
                </b>

            </div>

        </div>

        <!-- Scheduler -->

        <div class="col-md-4 col-6">

            <div class="card shadow text-center p-3 h-100">

                📅

                <br>

                <b id="scheduler">
                    Fertilizer Scheduler
                </b>

            </div>

        </div>

        <!-- Weather -->

        <div class="col-md-4 col-6">

            <div class="card shadow text-center p-3 h-100">

                🌦️

                <br>

                <b id="weather">
                    Weather Alerts
                </b>

            </div>

        </div>

        <!-- Krishi Kendra -->

        <div class="col-md-4 col-6">

            <div class="card shadow text-center p-3 h-100">

                📍

                <br>

                <b id="krishi">
                    Krishi Kendra
                </b>

            </div>

        </div>

        <!-- Offline -->

        <div class="col-md-4 col-6">

            <div class="card shadow text-center p-3 h-100">

                📴

                <br>

                <b id="offline">
                    Offline AI
                </b>

            </div>

        </div>

        <!-- Feedback -->

        <div class="col-md-4 col-6">

            <div class="card shadow text-center p-3 h-100">

                💬

                <br>

                <b id="feedback">
                    Feedback
                </b>

            </div>

        </div>

        <!-- Help -->

        <div class="col-md-4 col-6">

            <div class="card shadow text-center p-3 h-100">

                ❓

                <br>

                <b id="help">
                    Help
                </b>

            </div>

        </div>

    </div>

</div>

<script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>

</body>

</html>
